services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: myfinance_app
    restart: unless-stopped
    user: "1000:1000"
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - myfinance
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: myfinance_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - myfinance
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: myfinance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: myfinance
      POSTGRES_USER: myfinance
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - myfinance

  redis:
    image: redis:7-alpine
    container_name: myfinance_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - myfinance

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: myfinance_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: "masterKey"
      MEILI_ENV: "development"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - myfinance

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: myfinance_queue
    restart: unless-stopped
    user: "1000:1000"
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - myfinance
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:

networks:
  myfinance:
    driver: bridge
